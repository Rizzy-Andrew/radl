<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Sign Up</title>
    <style>
      .auth-container {
        max-width: 450px;
        margin: 80px auto;
        padding: 0 20px;
      }

      .auth-card {
        background: var(--surface);
        padding: 40px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .auth-card h1 {
        font-family: 'Bebas Neue', cursive;
        font-size: 40px;
        margin-bottom: 32px;
        text-align: center;
        color: var(--accent2);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 13px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 16px;
        font-family: inherit;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--accent2);
      }

      .help-text {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .btn {
        width: 100%;
        background: var(--accent2);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
      }

      .btn:hover {
        background: var(--accent);
        transform: translateY(-2px);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        display: none;
      }

      .divider {
        text-align: center;
        margin: 24px 0;
        color: var(--text-muted);
        font-size: 13px;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: var(--border);
      }

      .divider::before { left: 0; }
      .divider::after { right: 0; }

      .auth-link-text {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: var(--text-muted);
      }

      .auth-link-text a {
        color: var(--accent2);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-link-text a:hover {
        text-decoration: underline;
      }

      .oauth-btn {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .oauth-btn:hover {
        background: var(--bg);
        border-color: var(--accent2);
      }

      .oauth-btn img {
        width: 20px;
        height: 20px;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/#classic">Classic Levels</a>
      <a href="/#platformer">Platformer Levels</a>
      <a href="/placement-history.html">Placement History</a>
      <a href="/submit.html">Submit</a>
      <a href="/leaderboard.html">Leaderboard</a>
    </nav>

    <div class="auth-container">
      <div class="auth-card">
        <h1>Create Account</h1>

        <div id="errorMessage" class="error-message"></div>

        <!-- OAuth Buttons -->
        <button class="oauth-btn" id="googleSignUpBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <button class="oauth-btn" id="discordSignUpBtn" style="display: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#5865F2" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          Continue with Discord
        </button>

        <div class="divider">OR</div>

        <form id="signupForm">
          <div class="form-group">
            <label for="username">Username (Optional)</label>
            <input 
              type="text" 
              id="username" 
              placeholder="Choose a username"
              minlength="3"
              maxlength="20"
              pattern="[a-zA-Z0-9_-]+"
            >
            <div class="help-text">3-20 characters. Letters, numbers, hyphens, and underscores only. Leave blank to use email prefix.</div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" required minlength="6">
            <div class="help-text">At least 6 characters</div>
          </div>

          <button type="submit" class="btn" id="signupBtn">Create Account</button>
        </form>

        <div class="auth-link-text">
          Already have an account? <a href="/login.html">Log in</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, OAuthProvider } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, doc, setDoc, getDoc, query, collection, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
          errorDiv.style.display = 'none';
        }, 5000);
      }

      // Check if username is already taken
      async function isUsernameTaken(username) {
        const usersRef = collection(db, 'users');
        const q = query(usersRef, where('username', '==', username));
        const querySnapshot = await getDocs(q);
        return !querySnapshot.empty;
      }

      // Create user profile in Firestore
      async function createUserProfile(user, customUsername = null) {
        try {
          // Check if profile already exists
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (userDoc.exists()) {
            // Profile already exists (from OAuth), just return
            return;
          }

          // Determine username
          let username = customUsername;
          if (!username) {
            // Use email prefix if no custom username provided
            username = user.email ? user.email.split('@')[0] : `user_${user.uid.substring(0, 8)}`;
          }

          // Create profile
          await setDoc(doc(db, 'users', user.uid), {
            uid: user.uid,
            email: user.email,
            username: username,
            completions: [],
            createdAt: new Date()
          });
        } catch (error) {
          console.error('Error creating user profile:', error);
          throw error;
        }
      }

      // Email/Password Signup
      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const usernameInput = document.getElementById('username').value.trim();
        const signupBtn = document.getElementById('signupBtn');

        // Validate username if provided
        if (usernameInput) {
          const usernameRegex = /^[a-zA-Z0-9_-]{3,20}$/;
          if (!usernameRegex.test(usernameInput)) {
            showError('Invalid username format. Use 3-20 characters (letters, numbers, hyphens, underscores only).');
            return;
          }

          // Check if username is taken
          const taken = await isUsernameTaken(usernameInput);
          if (taken) {
            showError('Username is already taken. Please choose another.');
            return;
          }
        }

        signupBtn.disabled = true;
        signupBtn.textContent = 'Creating Account...';

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          await createUserProfile(userCredential.user, usernameInput || null);
          window.location.href = '/profile.html';
        } catch (error) {
          console.error('Signup error:', error);
          if (error.code === 'auth/email-already-in-use') {
            showError('This email is already registered. Try logging in instead.');
          } else if (error.code === 'auth/weak-password') {
            showError('Password should be at least 6 characters.');
          } else {
            showError('Failed to create account. Please try again.');
          }
        } finally {
          signupBtn.disabled = false;
          signupBtn.textContent = 'Create Account';
        }
      });

      // Google Sign-In
      document.getElementById('googleSignUpBtn').addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        try {
          const result = await signInWithPopup(auth, provider);
          await createUserProfile(result.user);
          window.location.href = '/profile.html';
        } catch (error) {
          console.error('Google sign-in error:', error);
          showError('Failed to sign in with Google. Please try again.');
        }
      });

      // Discord Sign-In (if enabled in Firebase)
      // Note: Discord OAuth needs to be configured in Firebase Console first
      const discordBtn = document.getElementById('discordSignUpBtn');
      
      // Check if Discord provider is configured by attempting to create the provider
      try {
        const discordProvider = new OAuthProvider('1501075565204082728');
        // If no error, Discord is configured - show the button
        discordBtn.style.display = 'flex';
        
        discordBtn.addEventListener('click', async () => {
          try {
            const result = await signInWithPopup(auth, discordProvider);
            await createUserProfile(result.user);
            window.location.href = '/profile.html';
          } catch (error) {
            console.error('Discord sign-in error:', error);
            showError('Failed to sign in with Discord. Please try again.');
          }
        });
      } catch (error) {
        // Discord provider not configured, keep button hidden
        console.log('Discord OAuth not configured');
      }
    </script>
  </body>
</html>
