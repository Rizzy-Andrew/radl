<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RADL – Level</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .level-video {
      display: block;
      width: 100%;
      max-width: 680px;
      aspect-ratio: 16/9;
      border-radius: 10px;
      border: none;
      margin: 0 auto 40px auto;
    }

    table {
      width: 100%;
      max-width: 680px;
      margin: 0 auto 40px auto;
      border-collapse: collapse;
    }

    table th {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent2);
      font-family: 'Shantell Sans', cursive;
      font-weight: 800;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
    }

    table tr:hover td { background: var(--surface); }

    table a {
      color: var(--accent3);
      text-decoration: none;
    }

    table a:hover { text-decoration: underline; }

    .empty-note {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      max-width: 680px;
      margin: 0 auto 40px auto;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 0;
      font-size: 18px;
    }

    .error-msg {
      text-align: center;
      color: #f87171;
      padding: 80px 0;
    }

    /* Level stats bar */
    .level-stats-bar {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 680px;
      margin: 0 auto 40px auto;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .level-stat {
      text-align: center;
    }

    .level-stat-value {
      font-family: 'Bebas Neue', cursive;
      font-size: 32px;
      color: var(--accent);
      display: block;
    }

    .level-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* Victor row with avatar */
    .victor-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      vertical-align: middle;
      margin-right: 8px;
    }

    .victor-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .victor-name-link {
      color: var(--text) !important;
      text-decoration: none !important;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
    }

    .victor-name-link:hover {
      color: var(--accent2) !important;
    }

    .completion-rate-bar {
      width: 100%;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }

    .completion-rate-fill {
      height: 100%;
      background: var(--accent2);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<nav></nav>

<div class="container">
  <a class="back-button" href="/">← Back to List</a>
  <div id="level-content">
    <p class="loading">Loading level…</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { getFirestore, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
    authDomain: "radl-652e8.firebaseapp.com",
    projectId: "radl-652e8",
    storageBucket: "radl-652e8.firebasestorage.app",
    messagingSenderId: "453756233220",
    appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const CSV_MAIN    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv";
  const CSV_HISTORY = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=1766700324&single=true&output=csv";

  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQuotes = !inQuotes; }
      else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
      else { current += line[i]; }
    }
    result.push(current);
    return result;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).filter(l => l.trim()).map(line => {
      const values = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/"/g, '').trim(); });
      return obj;
    });
  }

  function getEmbedURL(url) {
    if (!url) return null;
    if (url.includes('youtube.com/embed/')) return url;
    const match = url.match(/(?:youtu\.be\/|v=)([\w-]{11})/);
    return match ? `https://www.youtube.com/embed/${match[1]}` : null;
  }

  const slug = window.location.pathname.replace(/^\/level\//, '').replace(/\/$/, '');

  async function loadLevel() {
    const content = document.getElementById('level-content');
    if (!slug) {
      content.innerHTML = '<p class="error-msg">No level slug in URL.</p>';
      return;
    }

    try {
      // Fetch CSV data + all Firestore users in parallel
      const [mainText, historyText, usersSnap] = await Promise.all([
        fetch(CSV_MAIN).then(r => r.text()),
        fetch(CSV_HISTORY).then(r => r.text()),
        getDocs(collection(db, 'users'))
      ]);

      const allLevels  = parseCSV(mainText);
      const allHistory = parseCSV(historyText);

      const level = allLevels.find(l => l.slug === slug);

      if (!level) {
        content.innerHTML = `<p class="error-msg">Level not found: <strong>${slug}</strong></p>`;
        return;
      }

      // Build victors from Firestore users who have this slug in completions
      const victors = [];
      usersSnap.forEach(doc => {
        const data = doc.data();
        const completions = data.completions || [];
        if (completions.includes(slug)) {
          victors.push({
            username: data.username || data.email?.split('@')[0] || 'Unknown',
            avatarURL: data.avatarURL || null,
            uid: doc.id
          });
        }
      });

      // Total users for completion rate
      const totalUsers = usersSnap.size;
      const completionRate = totalUsers > 0 ? Math.round((victors.length / totalUsers) * 100) : 0;

      const history = allHistory.filter(h => (h.slug || h.level) === slug);
      document.title = `RADL – ${level.name}`;
      const embedURL = getEmbedURL(level.video);

      content.innerHTML = `
        <div class="level-hero">
          <span class="level-rank">Rank #${level.rank} — ${level.points} pts</span>
          <h1>${level.name}</h1>
          <p style="color:var(--text-muted);font-size:14px;margin-top:12px;">
            by <strong style="color:var(--text)">${level.publisher}</strong>
            ${level.datePlaced ? `&nbsp;·&nbsp; added ${level.datePlaced}` : ''}
          </p>
        </div>

        ${embedURL
          ? `<iframe class="level-video" src="${embedURL}" allowfullscreen title="${level.name}"></iframe>`
          : level.video
            ? `<p style="text-align:center;margin-bottom:40px"><a href="${level.video}" target="_blank" style="color:var(--accent3)">▶ Watch Video</a></p>`
            : ''}

        <!-- Share Buttons -->
        <div id="shareButtons"></div>

       
        <!-- Placement History -->
        <div class="section-header" style="max-width:680px;margin:0 auto 16px auto">
          <h2>Placement History</h2>
          <div class="section-line"></div>
        </div>
        ${renderHistoryTable(history)}

        <!-- Victors -->
        <div class="section-header" style="max-width:680px;margin:0 auto 16px auto">
          <h2>Victors</h2>
          <span class="section-count">${victors.length}</span>
          <div class="section-line"></div>
        </div>
        ${renderVictorsTable(victors)}
      `;

      // Add share buttons
      const { addShareButtons } = await import('/share.js');
      addShareButtons(
        document.getElementById('shareButtons'),
        level.name,
        `/level/${slug}`
      );

    } catch (err) {
      console.error(err);
      content.innerHTML = `<p class="error-msg">Failed to load level data.<br><small>${err.message}</small></p>`;
    }
  }

  function renderHistoryTable(rows) {
    if (!rows.length) return '<p class="empty-note">No history recorded yet.</p>';
    const keys = Object.keys(rows[0]).filter(k => k !== 'slug' && k !== 'level');
    return `<table>
      <thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r =>
        `<tr>${keys.map(k => `<td>${r[k] || ''}</td>`).join('')}</tr>`
      ).join('')}</tbody>
    </table>`;
  }

  function renderVictorsTable(victors) {
    if (!victors.length) return '<p class="empty-note">No victors yet — be the first!</p>';
    return `<table style="max-width:680px;margin:0 auto 40px auto;">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Profile</th>
        </tr>
      </thead>
      <tbody>
        ${victors.map((v, i) => `
          <tr>
            <td style="color:var(--text-muted);font-family:'Bebas Neue',cursive;font-size:18px;">${i + 1}</td>
            <td>
              <a class="victor-name-link" href="/user/${v.username}">
                <span class="victor-avatar">
                  ${v.avatarURL ? `<img src="${v.avatarURL}" alt="${v.username}">` : '👤'}
                </span>
                ${v.username}
              </a>
            </td>
            <td><a href="/user/${v.username}" style="color:var(--accent3);">View →</a></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
  }

  onAuthStateChanged(auth, () => {
    loadLevel();
  });
</script>

<script type="module" src="/nav.js"></script>
</body>
</html>
