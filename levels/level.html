<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="../style.css">
    <title>Loading...</title>
  </head>
  <body>
    <nav>
      <a href="../index.html#classic">Classic Levels</a>
      <a href="../index.html#platformer">Platformer Levels</a>
      <a href="../placement-history.html">Placement History</a>
    </nav>

    <div class="container">
      <a class="back-button" href="../index.html">← Back</a>
      <div id="content"></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      fetch('../levels.json')
        .then(response => response.json())
        .then(levels => {
          const level = levels.find(l => l.slug === slug);

          if (!level) {
            document.getElementById('content').textContent = 'Level not found.';
            return;
          }

          document.title = level.name + ' - RADL';

          const videoHTML = level.video
            ? `<div class="info-box">
                <h2>Video</h2>
                <iframe width="100%" height="360" src="${level.video}" frameborder="0" allowfullscreen></iframe>
               </div>`
            : '';

          const victorsHTML = level.victors && level.victors.length > 0
            ? level.victors.map(v => `<p>${v}</p>`).join('')
            : '<p>None yet</p>';

          const historyHTML = level.placementHistory
            ? level.placementHistory.map(h => `<p>#${h.rank} - ${h.date} - ${h.note}</p>`).join('')
            : '<p>No history yet</p>';

          document.getElementById('content').innerHTML = `
            <h1>${level.name}</h1>
            <h2>#${level.rank}</h2>
            ${videoHTML}
            <div class="info-box">
              <h2>Publisher</h2>
              <p>${level.publisher || 'Unknown'}</p>
            </div>
            <div class="info-box">
              <h2>Points</h2>
              <p>${level.points} points</p>
            </div>
            <div class="info-box">
              <h2>Position History</h2>
              ${historyHTML}
            </div>
            <div class="info-box">
              <h2>Victors</h2>
              ${victorsHTML}
            </div>
          `;
        })
        .catch(() => {
          document.getElementById('content').textContent = 'Error loading level data.';
        });
    </script>
  </body>
</html>
