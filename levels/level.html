<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="../style.css">
    <title>Loading...</title>
  </head>
  <body>
    <nav>
      <a href="../index.html#classic">Classic Levels</a>
      <a href="../index.html#platformer">Platformer Levels</a>
      <a href="../placement-history.html">Placement History</a>
    </nav>

    <div class="container">
      <a class="back-button" href="../index.html">← Back</a>
      <div id="content"></div>
    </div>

<script>
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv';

  const parts = window.location.pathname.split('/');
  const slug = parts[parts.length - 1];

  // Fetch both at the same time
  Promise.all([
    fetch(SHEET_URL).then(r => r.text()),
    fetch('/levels.json').then(r => r.json())
  ])
  .then(([csv, jsonLevels]) => {
    // Get basic info from sheet
    const rows = csv.trim().split('\n').slice(1);
    const levels = rows.map(row => {
      const cols = row.split(',');
      return {
        rank: cols[0],
        name: cols[1],
        slug: cols[2],
        publisher: cols[3],
        points: cols[4],
        video: cols[5],
        datePlaced: cols[6]
      };
    });

    const level = levels.find(l => l.slug === slug);
    const jsonLevel = jsonLevels.find(l => l.slug === slug);

    if (!level) {
      document.getElementById('content').textContent = 'Level not found.';
      return;
    }

    document.title = level.name + ' - RADL';

    const videoHTML = level.video
      ? `<div class="info-box">
          <h2>Video</h2>
          <iframe width="100%" height="360" src="${level.video}" frameborder="0" allowfullscreen></iframe>
         </div>`
      : '';

    // Placement history from JSON
    const historyHTML = jsonLevel && jsonLevel.placementHistory
      ? jsonLevel.placementHistory.map(h => `<p>#${h.rank} - ${h.date} - ${h.note}</p>`).join('')
      : '<p>No history yet</p>';

    // Victors from JSON
    const victorsHTML = jsonLevel && jsonLevel.victors && jsonLevel.victors.length > 0
      ? jsonLevel.victors.map(v => `<p>${v}</p>`).join('')
      : '<p>None yet</p>';

    document.getElementById('content').innerHTML = `
      <h1>${level.name}</h1>
      <h2>#${level.rank}</h2>
      ${videoHTML}
      <div class="info-box">
        <h2>Publisher</h2>
        <p>${level.publisher || 'Unknown'}</p>
      </div>
      <div class="info-box">
        <h2>Points</h2>
        <p>${level.points} points</p>
      </div>
      <div class="info-box">
        <h2>Position History</h2>
        ${historyHTML}
      </div>
      <div class="info-box">
        <h2>Victors</h2>
        ${victorsHTML}
      </div>
    `;
  })
  .catch(error => {
    document.getElementById('content').textContent = 'Error: ' + error;
  });
</script>
  </body>
</html>
