<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RADL – Level</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* Only styles that aren't already in style.css */
    .level-video {
      display: block;
      width: 100%;
      max-width: 680px;
      aspect-ratio: 16/9;
      border-radius: 10px;
      border: none;
      margin: 0 auto 40px auto;
    }

    table {
      width: 100%;
      max-width: 680px;
      margin: 0 auto 40px auto;
      border-collapse: collapse;
    }

    table th {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent2);
      font-family: 'Shantell Sans', cursive;
      font-weight: 800;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
    }

    table tr:hover td {
      background: var(--surface);
    }

    table a {
      color: var(--accent3);
      text-decoration: none;
    }

    table a:hover {
      text-decoration: underline;
    }

    .empty-note {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      max-width: 680px;
      margin: 0 auto 40px auto;
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 0;
      font-size: 18px;
    }

    .error-msg {
      text-align: center;
      color: #f87171;
      padding: 80px 0;
    }
  </style>
</head>
<body>

<nav></nav>

<script type="module" src="/nav.js"></script>

  <div class="container">
    <a class="back-button" href="/">← Back to List</a>

    <div id="level-content">
      <p class="loading">Loading level…</p>
    </div>
  </div>

  <script>
    const CSV_MAIN    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv";
    const CSV_VICTORS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=1496346185&single=true&output=csv";
    const CSV_HISTORY = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=1766700324&single=true&output=csv";

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') { inQuotes = !inQuotes; }
        else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
        else { current += line[i]; }
      }
      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g, '').trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = parseCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/"/g, '').trim(); });
        return obj;
      });
    }

   function getEmbedURL(url) {
  if (!url) return null;
  // Already an embed URL
  if (url.includes('youtube.com/embed/')) return url;
  // youtu.be/ID or watch?v=ID
  const match = url.match(/(?:youtu\.be\/|v=)([\w-]{11})/);
  return match ? `https://www.youtube.com/embed/${match[1]}` : null;
}

    const slug = window.location.pathname.replace(/^\/level\//, '').replace(/\/$/, '');

    async function loadLevel() {
      const content = document.getElementById('level-content');

      if (!slug) {
        content.innerHTML = '<p class="error-msg">No level slug in URL.</p>';
        return;
      }

      try {
        const [mainText, victorsText, historyText] = await Promise.all([
          fetch(CSV_MAIN).then(r => r.text()),
          fetch(CSV_VICTORS).then(r => r.text()),
          fetch(CSV_HISTORY).then(r => r.text()),
        ]);

        const allLevels  = parseCSV(mainText);
        const allVictors = parseCSV(victorsText);
        const allHistory = parseCSV(historyText);

        const level = allLevels.find(l => l.slug === slug);

        if (!level) {
          content.innerHTML = `<p class="error-msg">Level not found: <strong>${slug}</strong></p>`;
          return;
        }

        const victors = allVictors.filter(v => (v.slug || v.level) === slug);
        const history = allHistory.filter(h => (h.slug || h.level) === slug);

        document.title = `RADL – ${level.name}`;

        const embedURL = getEmbedURL(level.video);

        content.innerHTML = `
          <div class="level-hero">
            <span class="level-rank">Rank #${level.rank} — ${level.points} pts</span>
            <h1>${level.name}</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 12px;">
              by <strong style="color: var(--text)">${level.publisher}</strong>
              ${level.datePlaced ? `&nbsp;·&nbsp; beaten ${level.datePlaced}` : ''}
            </p>
          </div>

          ${embedURL
            ? `<iframe class="level-video" src="${embedURL}" allowfullscreen title="${level.name}"></iframe>`
            : level.video
              ? `<p style="text-align:center;margin-bottom:40px"><a href="${level.video}" target="_blank" rel="noopener" style="color:var(--accent3)">▶ Watch Video</a></p>`
              : ''}

          <div class="section-header" style="max-width:680px;margin:0 auto 16px auto">
            <h2>Placement History</h2>
            <div class="section-line"></div>
          </div>
          ${renderHistoryTable(history)}

          <div class="section-header" style="max-width:680px;margin:0 auto 16px auto">
            <h2>Victors</h2>
            <span class="section-count">${victors.length}</span>
            <div class="section-line"></div>
          </div>
          ${renderVictorsTable(victors)}
        `;

      } catch (err) {
        console.error(err);
        content.innerHTML = `<p class="error-msg">Failed to load level data.<br><small>${err.message}</small></p>`;
      }
    }

    function renderHistoryTable(rows) {
      if (!rows.length) return '<p class="empty-note">No history recorded yet.</p>';
      const keys = Object.keys(rows[0]).filter(k => k !== 'slug' && k !== 'level');
      return `<table>
        <thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r =>
          `<tr>${keys.map(k => `<td>${r[k] || ''}</td>`).join('')}</tr>`
        ).join('')}</tbody>
      </table>`;
    }

function renderVictorsTable(rows) {
  if (!rows.length) return '<p class="empty-note">No victors yet — be the first!</p>';
  const keys = Object.keys(rows[0]).filter(k => k !== 'slug' && k !== 'level');
  return `<table>
    <thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r =>
      `<tr>${keys.map(k => {
        const val = r[k] || '';
        if ((k === 'video' || k === 'link') && val.startsWith('http')) {
          return `<td><a href="${val}" target="_blank" rel="noopener">▶ Watch</a></td>`;
        }
        if (k === 'victor' || k === 'player' || k === 'name') {
          const video = r['video'] || r['link'] || '';
          if (video.startsWith('http')) {
            return `<td><a href="${video}" target="_blank" rel="noopener">${val}</a></td>`;
          }
        }
        return `<td>${val}</td>`;
      }).join('')}</tr>`
    ).join('')}</tbody>
  </table>`;
}

    loadLevel();
  </script>
  <script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
    authDomain: "radl-652e8.firebaseapp.com",
    projectId: "radl-652e8",
    storageBucket: "radl-652e8.firebasestorage.app",
    messagingSenderId: "453756233220",
    appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Check auth state and update nav
  onAuthStateChanged(auth, (user) => {
    const nav = document.querySelector('nav');
    
    // Remove existing auth links
    const existingAuthLinks = nav.querySelectorAll('.auth-link');
    existingAuthLinks.forEach(link => link.remove());

    if (user) {
      // User is logged in - show profile and logout
      const username = user.email.split('@')[0]; // Use email prefix as username
      
      const profileLink = document.createElement('a');
      profileLink.href = '/profile.html';
      profileLink.className = 'auth-link';
      profileLink.textContent = username;
      nav.appendChild(profileLink);

      const logoutLink = document.createElement('a');
      logoutLink.href = '#';
      logoutLink.className = 'auth-link';
      logoutLink.textContent = 'Logout';
      logoutLink.addEventListener('click', async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = '/';
      });
      nav.appendChild(logoutLink);
    } else {
      // User is logged out - show login
      const loginLink = document.createElement('a');
      loginLink.href = '/login.html';
      loginLink.className = 'auth-link';
      loginLink.textContent = 'Login';
      nav.appendChild(loginLink);
    }
  });
</script>
</body>
</html>
