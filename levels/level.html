<script>
  const LEVELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv';
  const VICTORS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=1496346185&single=true&output=csv';
  const HISTORY_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=1766700324&single=true&output=csv';

const slug = window.location.pathname.split('/').filter(Boolean).pop();

  function parseCSV(csv) {
    const rows = csv.trim().split('\n').slice(1);
    return rows.map(row => row.split(','));
  }

  Promise.all([
    fetch(LEVELS_URL).then(r => r.text()),
    fetch(VICTORS_URL).then(r => r.text()),
    fetch(HISTORY_URL).then(r => r.text())
  ])
  .then(([levelsCSV, victorsCSV, historyCSV]) => {
    const levelsRows = parseCSV(levelsCSV);
    const level = levelsRows.map(cols => ({
      rank: cols[0],
      name: cols[1],
      slug: cols[2],
      publisher: cols[3],
      points: cols[4],
      video: cols[5],
      datePlaced: cols[6]
    })).find(l => l.slug === slug);

    if (!level) {
      document.getElementById('content').textContent = 'Level not found.';
      return;
    }

    document.title = level.name + ' - RADL';

    // Victors for this level
    const victors = parseCSV(victorsCSV)
      .filter(cols => cols[0] === slug)
      .map(cols => cols[1]);

    // History for this level, sorted by rank
    const history = parseCSV(historyCSV)
      .filter(cols => cols[0] === slug)
      .sort((a, b) => parseInt(a[1]) - parseInt(b[1]))
      .map(cols => ({ rank: cols[1], date: cols[2], note: cols[3] }));

    const videoHTML = level.video
      ? `<div class="info-box">
          <h2>Video</h2>
          <iframe width="100%" height="360" src="${level.video}" frameborder="0" allowfullscreen></iframe>
         </div>`
      : '';

    const victorsHTML = victors.length > 0
      ? victors.map(v => `<p>${v}</p>`).join('')
      : '<p>None yet</p>';

    const historyHTML = history.length > 0
      ? history.map(h => `<p>#${h.rank} - ${h.date} - ${h.note}</p>`).join('')
      : '<p>No history yet</p>';

    document.getElementById('content').innerHTML = `
      <h1>${level.name}</h1>
      <h2>#${level.rank}</h2>
      ${videoHTML}
      <div class="info-box">
        <h2>Publisher</h2>
        <p>${level.publisher || 'Unknown'}</p>
      </div>
      <div class="info-box">
        <h2>Points</h2>
        <p>${level.points} points</p>
      </div>
      <div class="info-box">
        <h2>Position History</h2>
        ${historyHTML}
      </div>
      <div class="info-box">
        <h2>Victors</h2>
        ${victorsHTML}
      </div>
    `;
  })
  .catch(error => {
    document.getElementById('content').textContent = 'Error: ' + error;
  });
</script>
