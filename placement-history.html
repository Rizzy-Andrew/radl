<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Placement History</title>
  </head>
  <body>
    <nav>
      <a href="index.html#classic">Classic Levels</a>
      <a href="index.html#platformer">Platformer Levels</a>
      <a href="placement-history.html">Placement History</a>
    </nav>

    <h1>Placement History</h1>
    <ul id="history-list"></ul>

    <script>
      fetch('levels.json')
        .then(response => response.json())
        .then(levels => {
          // Sort by date, oldest first
          levels.sort((a, b) => new Date(a.datePlaced) - new Date(b.datePlaced));

          const list = document.getElementById('history-list');

          levels.forEach((level, index) => {
            // Format date: "2026-02-14" → "2/14/2026"
            const date = new Date(level.datePlaced);
            const formatted = `${date.getUTCMonth() + 1}/${date.getUTCDate()}/${date.getUTCFullYear()}`;

            const item = document.createElement('li');
            item.textContent = `${formatted} - ${level.name} placed at #${level.initialPlacement}`;
            list.appendChild(item);
          });
        });
    </script>
  </body>
</html>
