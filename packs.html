<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Packs</title>
    <style>
      .container {
        max-width: 1000px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .packs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        margin-top: 32px;
      }

      .pack-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        text-decoration: none;
        color: var(--text);
        transition: transform 0.2s, border-color 0.2s;
        display: block;
      }

      .pack-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent2);
      }

      .pack-banner {
        height: 8px;
      }

      .pack-body {
        padding: 24px;
      }

      .pack-name {
        font-family: 'Bebas Neue', cursive;
        font-size: 28px;
        margin-bottom: 8px;
      }

      .pack-description {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 20px;
        line-height: 1.5;
      }

      .pack-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .pack-bonus {
        font-family: 'Bebas Neue', cursive;
        font-size: 18px;
        color: var(--accent);
      }

      .progress-bar-container {
        background: var(--bg);
        border-radius: 4px;
        height: 8px;
        overflow: hidden;
        margin-bottom: 8px;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }

      .progress-text {
        font-size: 13px;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
      }

      .completed-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
        margin-top: 8px;
      }

      .loading {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
        font-family: 'Bebas Neue', cursive;
        font-size: 28px;
      }

      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
      }

      .login-notice {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 24px;
        margin-bottom: 24px;
        font-size: 14px;
        color: var(--text-muted);
      }

      .login-notice a {
        color: var(--accent2);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
<nav></nav>


    <div class="container">
      <header>
        <h1>Packs</h1>
        <p class="subtitle">Complete themed collections for <span>bonus points</span></p>
      </header>

      <div id="loginNotice" class="login-notice" style="display: none;">
        <a href="/login.html">Log in</a> to track your pack progress!
      </div>

      <div id="loadingMessage" class="loading">Loading packs...</div>
      <div id="packsGrid" class="packs-grid" style="display: none;"></div>
      <div id="emptyState" class="empty-state" style="display: none;">No packs yet. Check back soon!</div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, collection, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let userCompletions = [];

      async function loadPacks(user) {
        try {
          // Load user completions if logged in
          if (user) {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
              userCompletions = userDoc.data().completions || [];
            }
          }

          // Load all packs
          const packsSnap = await getDocs(collection(db, 'packs'));
          const packs = [];
          packsSnap.forEach(doc => packs.push({ id: doc.id, ...doc.data() }));

          document.getElementById('loadingMessage').style.display = 'none';

          if (packs.length === 0) {
            document.getElementById('emptyState').style.display = 'block';
            return;
          }

          const grid = document.getElementById('packsGrid');
          grid.style.display = 'grid';

          grid.innerHTML = packs.map(pack => {
            const levels = pack.levels || [];
            const completed = levels.filter(slug => userCompletions.includes(slug)).length;
            const total = levels.length;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            const isCompleted = completed === total && total > 0;
            const color = pack.color || '#a855f7';

            return `
              <a class="pack-card" href="/pack.html?id=${pack.id}">
                <div class="pack-banner" style="background: ${color}"></div>
                <div class="pack-body">
                  <div class="pack-name" style="color: ${color}">${pack.name}</div>
                  <div class="pack-description">${pack.description || ''}</div>

                  <div class="pack-meta">
                    <span>${total} levels</span>
                    <span class="pack-bonus">+${pack.bonusPoints || 0} bonus pts</span>
                  </div>

                  ${user ? `
                    <div class="progress-bar-container">
                      <div class="progress-bar-fill" style="width: ${percent}%; background: ${color}"></div>
                    </div>
                    <div class="progress-text">
                      <span>${completed}/${total} completed</span>
                      <span>${percent}%</span>
                    </div>
                    ${isCompleted ? '<div class="completed-badge">✓ Completed!</div>' : ''}
                  ` : `
                    <div style="font-size: 13px; color: var(--text-muted);">${total} levels to complete</div>
                  `}
                </div>
              </a>
            `;
          }).join('');

        } catch (error) {
          console.error('Error loading packs:', error);
          document.getElementById('loadingMessage').textContent = 'Failed to load packs.';
        }
      }

      onAuthStateChanged(auth, async (user) => {
        const nav = document.querySelector('nav');
        nav.querySelectorAll('.auth-link').forEach(l => l.remove());

        if (user) {
          let username = user.email.split('@')[0];
          let isAdmin = false;

          try {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
              username = userDoc.data().username || username;
              isAdmin = userDoc.data().isAdmin === true;
            }
          } catch (e) {}

          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          const settingsLink = document.createElement('a');
          settingsLink.href = '/settings.html';
          settingsLink.className = 'auth-link';
          settingsLink.textContent = 'Settings';
          nav.appendChild(settingsLink);

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);
        } else {
          document.getElementById('loginNotice').style.display = 'block';

          const loginLink = document.createElement('a');
          loginLink.href = '/login.html';
          loginLink.className = 'auth-link';
          loginLink.textContent = 'Login';
          nav.appendChild(loginLink);
        }

        await loadPacks(user);
      });
    </script>
    <script type="module" src="/nav.js"></script>
  </body>
</html>
