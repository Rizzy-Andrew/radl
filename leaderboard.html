<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Leaderboard</title>
    <style>
      .leaderboard-table {
        width: 100%;
        max-width: 800px;
        margin: 0 auto 40px auto;
        border-collapse: collapse;
      }

      .leaderboard-table th {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent2);
        font-family: 'Shantell Sans', cursive;
        font-weight: 800;
        padding: 12px 16px;
        text-align: left;
        border-bottom: 2px solid var(--border);
      }

      .leaderboard-table td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        font-size: 15px;
      }

      .leaderboard-table tr:hover td {
        background: var(--surface);
      }

      .rank-cell {
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
        color: var(--text-muted);
        width: 60px;
        text-align: center;
      }

      .leaderboard-table tr:nth-child(1) .rank-cell { color: #ffd700; font-size: 28px; }
      .leaderboard-table tr:nth-child(2) .rank-cell { color: #c0c0c0; font-size: 26px; }
      .leaderboard-table tr:nth-child(3) .rank-cell { color: #cd7f32; font-size: 25px; }

      .player-cell {
        font-weight: 700;
        font-size: 17px;
      }

      .stat-cell {
        text-align: center;
        font-family: 'Bebas Neue', cursive;
        font-size: 20px;
        color: var(--accent);
      }

      .level-link {
        color: var(--accent3);
        text-decoration: none;
        font-size: 14px;
      }

      .level-link:hover {
        text-decoration: underline;
      }

      .loading {
        text-align: center;
        color: var(--text-muted);
        padding: 80px 0;
        font-size: 18px;
      }

      .tabs {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 32px;
      }

      .tab {
        padding: 10px 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }

      .tab:hover {
        border-color: var(--accent2);
        color: var(--text);
      }

      .tab.active {
        background: var(--accent2);
        color: white;
        border-color: var(--accent2);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/#classic">Classic Levels</a>
      <a href="/#platformer">Platformer Levels</a>
      <a href="/placement-history.html">Placement History</a>
      <a href="/submit.html">Submit</a>
      <a href="/leaderboard.html">Leaderboard</a>
    </nav>

    <div class="container">
      <header>
        <h1>Leaderboard</h1>
        <p class="subtitle">Top players <span>ranked</span></p>
      </header>

      <div class="tabs">
        <div class="tab active" onclick="showTab('completions')">Most Completions</div>
        <div class="tab" onclick="showTab('points')">Total Points</div>
        <div class="tab" onclick="showTab('hardest')">Hardest Level</div>
      </div>

      <div id="leaderboard-content">
        <p class="loading">Loading leaderboard...</p>
      </div>
    </div>

    <script>
      const CSV_MAIN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv";
      const CSV_VICTORS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=1496346185&single=true&output=csv";

      let levelsData = [];
      let victorsData = [];
      let currentTab = 'completions';

      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQuotes = !inQuotes; }
          else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
          else { current += line[i]; }
        }
        result.push(current);
        return result;
      }

      function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g, '').trim());
        return lines.slice(1).filter(l => l.trim()).map(line => {
          const values = parseCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/"/g, '').trim(); });
          return obj;
        });
      }

      async function loadData() {
        try {
          const [mainText, victorsText] = await Promise.all([
            fetch(CSV_MAIN).then(r => r.text()),
            fetch(CSV_VICTORS).then(r => r.text()),
          ]);

          levelsData = parseCSV(mainText);
          victorsData = parseCSV(victorsText);

          showTab(currentTab);
        } catch (err) {
          document.getElementById('leaderboard-content').innerHTML = 
            '<p style="color:#f87171;text-align:center;padding:80px 0">Failed to load leaderboard</p>';
        }
      }

      function showTab(tab) {
        currentTab = tab;
        
        // Update tab buttons
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event?.target?.classList.add('active');

        const content = document.getElementById('leaderboard-content');

        if (tab === 'completions') {
          content.innerHTML = buildCompletionsTable();
        } else if (tab === 'points') {
          content.innerHTML = buildPointsTable();
        } else if (tab === 'hardest') {
          content.innerHTML = buildHardestTable();
        }
      }

      function buildCompletionsTable() {
        const playerCounts = {};
        victorsData.forEach(v => {
          const name = v.victor || v.player || 'Unknown';
          playerCounts[name] = (playerCounts[name] || 0) + 1;
        });

        const sorted = Object.entries(playerCounts).sort((a, b) => b[1] - a[1]);

        return `
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th style="text-align:center">Rank</th>
                <th>Player</th>
                <th style="text-align:center">Completions</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((p, i) => `
                <tr>
                  <td class="rank-cell">${i + 1}</td>
                  <td class="player-cell">${p[0]}</td>
                  <td class="stat-cell">${p[1]}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function buildPointsTable() {
        const playerPoints = {};
        
        victorsData.forEach(v => {
          const name = v.victor || v.player || 'Unknown';
          const slug = v.slug || v.level;
          const level = levelsData.find(l => l.slug === slug);
          const points = level ? parseInt(level.points) || 0 : 0;
          playerPoints[name] = (playerPoints[name] || 0) + points;
        });

        const sorted = Object.entries(playerPoints).sort((a, b) => b[1] - a[1]);

        return `
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th style="text-align:center">Rank</th>
                <th>Player</th>
                <th style="text-align:center">Total Points</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((p, i) => `
                <tr>
                  <td class="rank-cell">${i + 1}</td>
                  <td class="player-cell">${p[0]}</td>
                  <td class="stat-cell">${p[1]}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function buildHardestTable() {
        const playerHardest = {};
        
        victorsData.forEach(v => {
          const name = v.victor || v.player || 'Unknown';
          const slug = v.slug || v.level;
          const level = levelsData.find(l => l.slug === slug);
          
          if (level) {
            const rank = parseInt(level.rank) || 999;
            if (!playerHardest[name] || rank < playerHardest[name].rank) {
              playerHardest[name] = {
                rank: rank,
                name: level.name,
                slug: slug
              };
            }
          }
        });

        const sorted = Object.entries(playerHardest).sort((a, b) => a[1].rank - b[1].rank);

        return `
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th style="text-align:center">Rank</th>
                <th>Player</th>
                <th>Hardest Level</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((p, i) => `
                <tr>
                  <td class="rank-cell">${i + 1}</td>
                  <td class="player-cell">${p[0]}</td>
                  <td>
                    <a class="level-link" href="/level/${p[1].slug}">
                      #${p[1].rank} ${p[1].name}
                    </a>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      loadData();
    </script>
    <script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
    authDomain: "radl-652e8.firebaseapp.com",
    projectId: "radl-652e8",
    storageBucket: "radl-652e8.firebasestorage.app",
    messagingSenderId: "453756233220",
    appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Check auth state and update nav
  onAuthStateChanged(auth, (user) => {
    const nav = document.querySelector('nav');
    
    // Remove existing auth links
    const existingAuthLinks = nav.querySelectorAll('.auth-link');
    existingAuthLinks.forEach(link => link.remove());

    if (user) {
      // User is logged in - show profile and logout
      const username = user.email.split('@')[0]; // Use email prefix as username
      
      const profileLink = document.createElement('a');
      profileLink.href = '/profile.html';
      profileLink.className = 'auth-link';
      profileLink.textContent = username;
      nav.appendChild(profileLink);

      const logoutLink = document.createElement('a');
      logoutLink.href = '#';
      logoutLink.className = 'auth-link';
      logoutLink.textContent = 'Logout';
      logoutLink.addEventListener('click', async (e) => {
        e.preventDefault();
        await signOut(auth);
        window.location.href = '/';
      });
      nav.appendChild(logoutLink);
    } else {
      // User is logged out - show login
      const loginLink = document.createElement('a');
      loginLink.href = '/login.html';
      loginLink.className = 'auth-link';
      loginLink.textContent = 'Login';
      nav.appendChild(loginLink);
    }
  });
</script>
  </body>
</html>
