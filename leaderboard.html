<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Leaderboard</title>
    <style>
      .leaderboard-table {
        width: 100%;
        max-width: 800px;
        margin: 0 auto 40px auto;
        border-collapse: collapse;
      }

      .leaderboard-table th {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent2);
        font-family: 'Shantell Sans', cursive;
        font-weight: 800;
        padding: 12px 16px;
        text-align: left;
        border-bottom: 2px solid var(--border);
      }

      .leaderboard-table td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        font-size: 15px;
      }

      .leaderboard-table tr:hover td {
        background: var(--surface);
      }

      .rank-cell {
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
        color: var(--text-muted);
        width: 60px;
        text-align: center;
      }

      .leaderboard-table tr:nth-child(1) .rank-cell { color: #ffd700; font-size: 28px; }
      .leaderboard-table tr:nth-child(2) .rank-cell { color: #c0c0c0; font-size: 26px; }
      .leaderboard-table tr:nth-child(3) .rank-cell { color: #cd7f32; font-size: 25px; }

      .player-cell {
        font-weight: 700;
        font-size: 17px;
      }

      .stat-cell {
        text-align: center;
        font-family: 'Bebas Neue', cursive;
        font-size: 20px;
        color: var(--accent);
      }

      .level-link {
        color: var(--accent3);
        text-decoration: none;
        font-size: 14px;
      }

      .level-link:hover {
        text-decoration: underline;
      }

      .loading {
        text-align: center;
        color: var(--text-muted);
        padding: 80px 0;
        font-size: 18px;
      }

      .tabs {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 32px;
      }

      .tab {
        padding: 10px 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }

      .tab:hover {
        border-color: var(--accent2);
        color: var(--text);
      }

      .tab.active {
        background: var(--accent2);
        color: white;
        border-color: var(--accent2);
      }
    </style>
  </head>
  <body>
<nav></nav>



    <div class="container">
      <header>
        <h1>Leaderboard</h1>
        <p class="subtitle">Top players <span>ranked</span></p>
      </header>

      <div class="tabs">
        <div class="tab active" onclick="showTab('completions')">Most Completions</div>
        <div class="tab" onclick="showTab('points')">Total Points</div>
        <div class="tab" onclick="showTab('hardest')">Hardest Level</div>
      </div>

      <div id="leaderboard-content">
        <p class="loading">Loading leaderboard...</p>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // CSV URL for level data (still needed for points and ranks)
      const CSV_MAIN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv";

      let levelsData = [];
      let usersData = [];
      let currentTab = 'completions';

      // CSV parsing helper
      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQuotes = !inQuotes; }
          else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
          else { current += line[i]; }
        }
        result.push(current);
        return result;
      }

      function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g, '').trim());
        return lines.slice(1).filter(l => l.trim()).map(line => {
          const values = parseCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/"/g, '').trim(); });
          return obj;
        });
      }

      // Load data from both Firestore (users) and Google Sheets (levels)
      async function loadData() {
        try {
          // Fetch level data from Google Sheets
          const mainText = await fetch(CSV_MAIN).then(r => r.text());
          levelsData = parseCSV(mainText);

          // Create lookup map for level data
          const levelMap = {};
          levelsData.forEach(level => {
            levelMap[level.slug] = {
              name: level.name,
              rank: parseInt(level.rank) || 999,
              points: parseInt(level.points) || 0
            };
          });

          // Fetch all user profiles from Firestore
          const usersSnapshot = await getDocs(collection(db, 'users'));
          usersData = [];

          usersSnapshot.forEach(doc => {
            const user = doc.data();
            const completions = user.completions || [];
            
            // Calculate user stats
            let totalPoints = 0;
            let hardestRank = 999;
            let hardestLevelName = 'None';
            let hardestLevelSlug = '';
            
            completions.forEach(slug => {
              if (levelMap[slug]) {
                totalPoints += levelMap[slug].points;
                if (levelMap[slug].rank < hardestRank) {
                  hardestRank = levelMap[slug].rank;
                  hardestLevelName = levelMap[slug].name;
                  hardestLevelSlug = slug;
                }
              }
            });

            usersData.push({
              username: user.username || user.email.split('@')[0],
              completionsCount: completions.length,
              totalPoints: totalPoints,
              hardestLevel: {
                name: hardestLevelName,
                rank: hardestRank,
                slug: hardestLevelSlug
              }
            });
          });

          // Show the default tab
          showTab(currentTab);

        } catch (err) {
          console.error('Error loading leaderboard:', err);
          document.getElementById('leaderboard-content').innerHTML = 
            '<p style="color:#f87171;text-align:center;padding:80px 0">Failed to load leaderboard</p>';
        }
      }

      // Tab switching function (called by onclick in HTML)
      window.showTab = function(tab) {
        currentTab = tab;
        
        // Update tab buttons
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => {
          if (t.textContent.toLowerCase().includes(tab)) {
            t.classList.add('active');
          }
        });

        const content = document.getElementById('leaderboard-content');

        if (tab === 'completions') {
          content.innerHTML = buildCompletionsTable();
        } else if (tab === 'points') {
          content.innerHTML = buildPointsTable();
        } else if (tab === 'hardest') {
          content.innerHTML = buildHardestTable();
        }
      }

      function buildCompletionsTable() {
        // Filter out users with 0 completions and sort by count
        const sorted = usersData
          .filter(u => u.completionsCount > 0)
          .sort((a, b) => b.completionsCount - a.completionsCount);

        if (sorted.length === 0) {
          return '<p class="loading">No completions yet!</p>';
        }

        return `
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th style="text-align:center">Rank</th>
                <th>Player</th>
                <th style="text-align:center">Completions</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((u, i) => `
                <tr>
                  <td class="rank-cell">${i + 1}</td>
                  <td class="player-cell">${u.username}</td>
                  <td class="stat-cell">${u.completionsCount}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function buildPointsTable() {
        // Filter out users with 0 points and sort by total points
        const sorted = usersData
          .filter(u => u.totalPoints > 0)
          .sort((a, b) => b.totalPoints - a.totalPoints);

        if (sorted.length === 0) {
          return '<p class="loading">No points earned yet!</p>';
        }

        return `
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th style="text-align:center">Rank</th>
                <th>Player</th>
                <th style="text-align:center">Total Points</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((u, i) => `
                <tr>
                  <td class="rank-cell">${i + 1}</td>
                  <td class="player-cell">${u.username}</td>
                  <td class="stat-cell">${u.totalPoints}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function buildHardestTable() {
        // Filter out users with no completions and sort by hardest rank
        const sorted = usersData
          .filter(u => u.hardestLevel.rank < 999)
          .sort((a, b) => a.hardestLevel.rank - b.hardestLevel.rank);

        if (sorted.length === 0) {
          return '<p class="loading">No levels completed yet!</p>';
        }

        return `
          <table class="leaderboard-table">
            <thead>
              <tr>
                <th style="text-align:center">Rank</th>
                <th>Player</th>
                <th>Hardest Level</th>
              </tr>
            </thead>
            <tbody>
              ${sorted.map((u, i) => `
                <tr>
                  <td class="rank-cell">${i + 1}</td>
                  <td class="player-cell">${u.username}</td>
                  <td>
                    <a class="level-link" href="/level/${u.hardestLevel.slug}">
                      #${u.hardestLevel.rank} ${u.hardestLevel.name}
                    </a>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      // Check auth state and update nav
      onAuthStateChanged(auth, (user) => {
        const nav = document.querySelector('nav');
        
        // Remove existing auth links
        const existingAuthLinks = nav.querySelectorAll('.auth-link');
        existingAuthLinks.forEach(link => link.remove());

        if (user) {
          // User is logged in - show profile and logout
          const username = user.email.split('@')[0];
          
          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);
        } else {
          // User is logged out - show login
          const loginLink = document.createElement('a');
          loginLink.href = '/login.html';
          loginLink.className = 'auth-link';
          loginLink.textContent = 'Login';
          nav.appendChild(loginLink);
        }
      });

      // Load leaderboard data on page load
      loadData();
    </script>
    <script type="module" src="/nav.js"></script>
  </body>
</html>
