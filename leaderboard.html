<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Leaderboard</title>
    <style>
      .container {
        max-width: 900px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .search-wrapper {
        position: relative;
        margin-bottom: 24px;
      }

      .search-input {
        width: 100%;
        padding: 14px 20px 14px 48px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-size: 16px;
        font-family: inherit;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--accent2);
      }

      .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        opacity: 0.5;
        pointer-events: none;
      }

      .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
      }

      .leaderboard-table th {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent2);
        font-family: 'Shantell Sans', cursive;
        font-weight: 800;
        padding: 12px 16px;
        text-align: left;
        border-bottom: 2px solid var(--border);
      }

      .leaderboard-table th.right { text-align: right; }

      .leaderboard-table td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        font-size: 15px;
      }

      .leaderboard-table tr:hover td {
        background: var(--surface);
      }

      .rank-cell {
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
        color: var(--text-muted);
        width: 60px;
        text-align: center;
      }

      .leaderboard-table tr:nth-child(1) .rank-cell { color: #ffd700; font-size: 28px; }
      .leaderboard-table tr:nth-child(2) .rank-cell { color: #c0c0c0; font-size: 26px; }
      .leaderboard-table tr:nth-child(3) .rank-cell { color: #cd7f32; font-size: 25px; }

      .player-cell {
        font-weight: 700;
        font-size: 17px;
      }

      .player-cell a {
        color: var(--text);
        text-decoration: none;
        transition: color 0.2s;
      }

      .player-cell a:hover {
        color: var(--accent2);
      }

      .points-cell {
        text-align: right;
        font-family: 'Bebas Neue', cursive;
        font-size: 22px;
        color: var(--accent);
      }

      .completions-cell {
        text-align: right;
        font-family: 'Bebas Neue', cursive;
        font-size: 18px;
        color: var(--accent2);
      }

      .hardest-cell {
        text-align: right;
        font-size: 13px;
        color: var(--text-muted);
        max-width: 160px;
      }

      .hardest-cell a {
        color: var(--accent3);
        text-decoration: none;
      }

      .hardest-cell a:hover {
        text-decoration: underline;
      }

      .loading {
        text-align: center;
        color: var(--text-muted);
        padding: 80px 0;
        font-size: 18px;
      }

      .no-results {
        text-align: center;
        padding: 60px;
        color: var(--text-muted);
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
      }

      .results-count {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <nav></nav>

    <div class="container">
      <header>
        <h1>Leaderboard</h1>
        <p class="subtitle">Top players <span>ranked by points</span></p>
      </header>

      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search players..."
          autocomplete="off"
        >
      </div>

      <div class="results-count" id="resultsCount"></div>

      <div id="loadingMessage" class="loading">Loading leaderboard...</div>

      <table class="leaderboard-table" id="leaderboardTable" style="display:none;">
        <thead>
          <tr>
            <th style="text-align:center;">Rank</th>
            <th>Player</th>
            <th class="right">Points</th>
            <th class="right">Completions</th>
            <th class="right">Hardest Level</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>

      <div id="noResults" class="no-results" style="display:none;">No players found</div>
    </div>

    <script type="module" src="/nav.js"></script>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv';

      let allPlayers = [];

      function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
        return lines.slice(1).filter(l => l.trim()).map(line => {
          const values = line.split(',');
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/"/g, '').trim(); });
          return obj;
        });
      }

      function renderRows(players, query = '') {
        const tbody = document.getElementById('leaderboardBody');
        const noResults = document.getElementById('noResults');
        const count = document.getElementById('resultsCount');

        if (players.length === 0) {
          tbody.innerHTML = '';
          noResults.style.display = 'block';
          count.textContent = '';
          return;
        }

        noResults.style.display = 'none';
        count.textContent = `${players.length} player${players.length !== 1 ? 's' : ''}`;

        tbody.innerHTML = players.map((p, i) => {
          // Highlight search match in username
          let displayName = p.username;
          if (query) {
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            displayName = p.username.replace(regex, '<mark style="background:rgba(168,85,247,0.3);border-radius:3px;padding:0 2px;">$1</mark>');
          }

          return `
            <tr>
              <td class="rank-cell">${i + 1}</td>
              <td class="player-cell">
                <a href="/user/${p.username}">${displayName}</a>
              </td>
              <td class="points-cell">${p.totalPoints.toLocaleString()}</td>
              <td class="completions-cell">${p.completionsCount}</td>
              <td class="hardest-cell">
                ${p.hardestSlug
                  ? `<a href="/level/${p.hardestSlug}">#${p.hardestRank} ${p.hardestName}</a>`
                  : '<span style="color:var(--text-muted)">—</span>'
                }
              </td>
            </tr>
          `;
        }).join('');
      }

      async function loadLeaderboard() {
        try {
          // Load level data
          const res = await fetch(CSV_URL);
          const csvText = await res.text();
          const allLevels = parseCSV(csvText);
          const levelMap = {};
          allLevels.forEach(l => { levelMap[l.slug] = l; });

          // Load all users
          const snap = await getDocs(collection(db, 'users'));
          allPlayers = [];

          snap.forEach(doc => {
            const data = doc.data();
            const completions = data.completions || [];

            let totalPoints = 0;
            let hardestRank = 9999;
            let hardestName = '';
            let hardestSlug = '';

            completions.forEach(slug => {
              if (levelMap[slug]) {
                totalPoints += parseInt(levelMap[slug].points) || 0;
                const rank = parseInt(levelMap[slug].rank) || 9999;
                if (rank < hardestRank) {
                  hardestRank = rank;
                  hardestName = levelMap[slug].name;
                  hardestSlug = slug;
                }
              }
            });

            // Only show players with at least 1 completion
            if (completions.length === 0) return;

            allPlayers.push({
              username: data.username || data.email?.split('@')[0] || 'Unknown',
              completionsCount: completions.length,
              totalPoints,
              hardestRank,
              hardestName,
              hardestSlug
            });
          });

          // Sort by total points
          allPlayers.sort((a, b) => b.totalPoints - a.totalPoints);

          document.getElementById('loadingMessage').style.display = 'none';
          document.getElementById('leaderboardTable').style.display = 'table';
          renderRows(allPlayers);

        } catch (err) {
          console.error('Error loading leaderboard:', err);
          document.getElementById('loadingMessage').textContent = 'Failed to load leaderboard.';
        }
      }

      // Search
      document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.trim().toLowerCase();
        if (!query) {
          renderRows(allPlayers);
          return;
        }
        const filtered = allPlayers.filter(p =>
          p.username.toLowerCase().includes(query)
        );
        renderRows(filtered, query);
      });

      onAuthStateChanged(auth, () => {
        loadLeaderboard();
      });
    </script>
  </body>
</html>
