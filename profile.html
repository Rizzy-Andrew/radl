<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      .profile-container {
        max-width: 1200px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .profile-header {
        display: flex;
        align-items: center;
        gap: 32px;
        background: var(--surface);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid var(--border);
        margin-bottom: 32px;
      }

      .profile-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: var(--bg);
        border: 4px solid var(--accent2);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .profile-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .profile-avatar-placeholder {
        font-size: 60px;
      }

      .profile-info {
        flex: 1;
      }

      .profile-username {
        font-family: 'Bebas Neue', cursive;
        font-size: 48px;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .profile-bio {
        color: var(--text-muted);
        font-size: 15px;
        margin-bottom: 16px;
        line-height: 1.6;
      }

      .profile-meta {
        display: flex;
        gap: 24px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
        transition: transform 0.2s;
      }

      .stat-card:hover {
        transform: translateY(-4px);
      }

      .stat-value {
        font-family: 'Bebas Neue', cursive;
        font-size: 42px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }

      .stat-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-muted);
        font-weight: 700;
      }

      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 24px;
        margin-bottom: 32px;
      }

      .chart-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }

      .chart-card h3 {
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
        margin-bottom: 20px;
        color: var(--accent2);
      }

      .chart-container {
        position: relative;
        height: 300px;
      }

      .completions-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 32px;
      }

      .completions-section h2 {
        font-family: 'Bebas Neue', cursive;
        font-size: 32px;
        margin-bottom: 24px;
        color: var(--accent2);
      }

      .completions-grid {
        display: grid;
        gap: 12px;
      }

      .completion-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        transition: all 0.2s;
      }

      .completion-item:hover {
        border-color: var(--accent2);
        transform: translateX(4px);
      }

      .completion-info {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .completion-rank {
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
        color: var(--accent);
        min-width: 40px;
      }

      .completion-name {
        font-weight: 600;
        font-size: 16px;
      }

      .completion-points {
        font-family: 'Bebas Neue', cursive;
        font-size: 20px;
        color: var(--accent2);
      }

      .difficulty-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .diff-easy { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
      .diff-medium { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
      .diff-hard { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
      .diff-insane { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
      .diff-extreme { background: rgba(220, 38, 38, 0.2); color: #dc2626; }

      .loading {
        text-align: center;
        padding: 100px 20px;
        font-family: 'Bebas Neue', cursive;
        font-size: 32px;
        color: var(--text-muted);
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
      }

      .empty-state-icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
<nav></nav>

<script type="module" src="/nav.js"></script>

    <div class="profile-container">
      <div id="loadingMessage" class="loading">Loading profile...</div>

      <div id="profileContent" style="display: none;">
        <!-- Profile Header -->
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">
            <span class="profile-avatar-placeholder">👤</span>
          </div>
          <div class="profile-info">
            <h1 class="profile-username" id="profileUsername">Loading...</h1>
            <p class="profile-bio" id="profileBio"></p>
            <div class="profile-meta">
              <span>📧 <span id="profileEmail">-</span></span>
              <span>📅 Joined <span id="joinDate">-</span></span>
            </div>
          </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="totalCompletions">0</div>
            <div class="stat-label">Total Completions</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalPoints">0</div>
            <div class="stat-label">Total Points</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="hardestLevel">-</div>
            <div class="stat-label">Hardest Level</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="averageRank">-</div>
            <div class="stat-label">Average Rank</div>
          </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
          <div class="chart-card">
            <h3>Difficulty Breakdown</h3>
            <div class="chart-container">
              <canvas id="difficultyChart"></canvas>
            </div>
          </div>


        </div>

        <!-- Completions List -->
        <div class="completions-section">
          <h2>Your Completions (<span id="completionCount">0</span>)</h2>
          <div id="completionsList" class="completions-grid"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv';

      let difficultyChart = null;

      function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
        return lines.slice(1).filter(l => l.trim()).map(line => {
          const values = line.split(',');
          const obj = {};
          headers.forEach((h, i) => { 
            obj[h] = (values[i] || '').replace(/"/g, '').trim(); 
          });
          return obj;
        });
      }

      function getDifficulty(inGameRating) {
        const rating = inGameRating?.toLowerCase() || '';
        if (rating.includes('easy')) return 'Easy Demon';
        if (rating.includes('medium')) return 'Medium Demon';
        if (rating.includes('hard')) return 'Hard Demon';
        if (rating.includes('insane')) return 'Insane Demon';
        if (rating.includes('extreme')) return 'Extreme Demon';
        return 'Unknown';
      }

      function getDifficultyClass(difficulty) {
        if (difficulty.includes('Easy')) return 'diff-easy';
        if (difficulty.includes('Medium')) return 'diff-medium';
        if (difficulty.includes('Hard')) return 'diff-hard';
        if (difficulty.includes('Insane')) return 'diff-insane';
        if (difficulty.includes('Extreme')) return 'diff-extreme';
        return '';
      }

      async function loadProfile(user) {
        try {
          // Fetch user data from Firestore
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (!userDoc.exists()) {
            console.error('User profile not found');
            return;
          }

          const userData = userDoc.data();
          const completions = userData.completions || [];

          // Fetch levels data
          const response = await fetch(CSV_URL);
          const csvText = await response.text();
          const allLevels = parseCSV(csvText);

          // Create level map
          const levelMap = {};
          allLevels.forEach(level => {
            levelMap[level.slug] = level;
          });

          // Get completed levels
          const completedLevels = completions
            .map(slug => levelMap[slug])
            .filter(level => level)
            .sort((a, b) => parseInt(a.rank) - parseInt(b.rank));

          // Calculate stats
          const totalCompletions = completedLevels.length;
          const totalPoints = completedLevels.reduce((sum, level) => sum + (parseInt(level.points) || 0), 0);
          const hardestLevel = completedLevels.length > 0 ? completedLevels[0] : null;
          const averageRank = completedLevels.length > 0 
            ? Math.round(completedLevels.reduce((sum, level) => sum + parseInt(level.rank), 0) / completedLevels.length)
            : 0;

          // Difficulty breakdown
          const difficultyCount = {
            'Easy Demon': 0,
            'Medium Demon': 0,
            'Hard Demon': 0,
            'Insane Demon': 0,
            'Extreme Demon': 0
          };

          completedLevels.forEach(level => {
            const diff = getDifficulty(level.inGameRating);
            if (difficultyCount[diff] !== undefined) {
              difficultyCount[diff]++;
            }
          });

          // Update UI
          document.getElementById('profileUsername').textContent = userData.username || user.email.split('@')[0];
          document.getElementById('profileEmail').textContent = userData.email || user.email;
          document.getElementById('profileBio').textContent = userData.bio || 'No bio yet.';
          
          if (userData.avatarURL) {
            document.getElementById('profileAvatar').innerHTML = `<img src="${userData.avatarURL}" alt="Avatar">`;
          }

          if (userData.createdAt) {
            const joinDate = userData.createdAt.toDate ? userData.createdAt.toDate() : new Date(userData.createdAt);
            document.getElementById('joinDate').textContent = joinDate.toLocaleDateString();
          }

          document.getElementById('totalCompletions').textContent = totalCompletions;
          document.getElementById('totalPoints').textContent = totalPoints.toLocaleString();
          document.getElementById('hardestLevel').textContent = hardestLevel ? `#${hardestLevel.rank}` : '-';
          document.getElementById('averageRank').textContent = averageRank > 0 ? `#${averageRank}` : '-';
          document.getElementById('completionCount').textContent = totalCompletions;

          // Render charts
          renderDifficultyChart(difficultyCount);

          // Render completions list
          renderCompletions(completedLevels);

          // Show content
          document.getElementById('loadingMessage').style.display = 'none';
          document.getElementById('profileContent').style.display = 'block';

        } catch (error) {
          console.error('Error loading profile:', error);
        }
      }

      function renderDifficultyChart(difficultyCount) {
        const ctx = document.getElementById('difficultyChart').getContext('2d');
        
        if (difficultyChart) {
          difficultyChart.destroy();
        }

        difficultyChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: Object.keys(difficultyCount),
            datasets: [{
              data: Object.values(difficultyCount),
              backgroundColor: [
                'rgba(34, 197, 94, 0.8)',
                'rgba(251, 191, 36, 0.8)',
                'rgba(239, 68, 68, 0.8)',
                'rgba(168, 85, 247, 0.8)',
                'rgba(220, 38, 38, 0.8)'
              ],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  color: '#fff',
                  font: { size: 12 }
                }
              }
            }
          }
        });
      }

     
      function renderCompletions(completedLevels) {
        const container = document.getElementById('completionsList');

        if (completedLevels.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🎮</div>
              <p>No completions yet! Start beating some demons!</p>
            </div>
          `;
          return;
        }

        container.innerHTML = completedLevels.map(level => {
          const difficulty = getDifficulty(level.inGameRating);
          const diffClass = getDifficultyClass(difficulty);
          
          return `
            <div class="completion-item">
              <div class="completion-info">
                <div class="completion-rank">#${level.rank}</div>
                <div>
                  <div class="completion-name">${level.name}</div>
                  <span class="difficulty-badge ${diffClass}">${difficulty}</span>
                </div>
              </div>
              <div class="completion-points">${level.points} pts</div>
            </div>
          `;
        }).join('');
      }

      // Auth state
      onAuthStateChanged(auth, async (user) => {
        const nav = document.querySelector('nav');
        const existingAuthLinks = nav.querySelectorAll('.auth-link');
        existingAuthLinks.forEach(link => link.remove());

        if (user) {
          await loadProfile(user);

          // Get user data for nav
          let username = user.email.split('@')[0];
          let isAdmin = false;

          try {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
              const userData = userDoc.data();
              username = userData.username || username;
              isAdmin = userData.isAdmin === true;
            }
          } catch (error) {
            console.error('Error loading user data:', error);
          }

          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          const settingsLink = document.createElement('a');
          settingsLink.href = '/settings.html';
          settingsLink.className = 'auth-link';
          settingsLink.textContent = 'Settings';
          nav.appendChild(settingsLink);

          if (isAdmin) {
            const adminLink = document.createElement('a');
            adminLink.href = '/admin.html';
            adminLink.className = 'auth-link';
            adminLink.textContent = 'Admin';
            nav.appendChild(adminLink);
          }

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);
        } else {
          window.location.href = '/login.html';
        }
      });
    </script>
  </body>
</html>
