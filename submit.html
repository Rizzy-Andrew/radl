<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Submit</title>
    <style>
      .submit-form {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 32px;
        max-width: 580px;
        margin: 0 auto;
        position: relative;
        z-index: 10;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }

      .form-group label {
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent2);
        font-weight: 800;
      }

      .form-group input,
      .form-group select {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 16px;
        color: var(--text);
        font-family: 'Shantell Sans', cursive;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .form-group input:focus,
      .form-group select:focus {
        border-color: var(--accent2);
        box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
      }

      .form-group select option {
        background: var(--surface);
        color: var(--text);
      }

      .form-note {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 8px;
        color: white;
        font-family: 'Shantell Sans', cursive;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.2s;
        margin-top: 8px;
      }

      .submit-btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }

      .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .status-msg {
        text-align: center;
        margin-top: 16px;
        font-size: 15px;
        min-height: 24px;
      }

      .status-msg.success { color: #4ade80; }
      .status-msg.error { color: #f87171; }

      .login-required {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
      }

      .login-required h3 {
        font-size: 24px;
        margin-bottom: 16px;
        color: var(--text);
      }

      .login-required a {
        color: var(--accent2);
        text-decoration: none;
        font-weight: 700;
      }

      .login-required a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
<nav></nav>

<script type="module" src="/nav.js"></script>

    <div class="container">
      <header>
        <h1>Submit</h1>
        <p class="subtitle">Completed a level? <span>Let us know!</span></p>
      </header>

      <div id="submit-content">
        <p style="text-align:center;color:var(--text-muted);padding:80px 0">Loading...</p>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8piEYpPcelXSiPpyaakaU1phI-WJEKP475A_4-lKhtCRONRqopePPjra8wQyjyMWQIgZ79rH3mQUA/pub?gid=0&single=true&output=csv";
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzbDv_ccp48CWIosthU4_qRx6Zged0wBvSgvR_w4uUL4LTrihCzRBuCqov3MduLwbMemg/exec";

      let allLevels = [];
      let currentUser = null;

      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQuotes = !inQuotes; }
          else if (line[i] === ',' && !inQuotes) { result.push(current); current = ''; }
          else { current += line[i]; }
        }
        result.push(current);
        return result;
      }

      function parseCSV(text) {
        const lines = text.trim().split('\n');
        const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g, '').trim());
        return lines.slice(1).filter(l => l.trim()).map(line => {
          const values = parseCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (values[i] || '').replace(/"/g, '').trim(); });
          return obj;
        });
      }

      // Check auth state
      onAuthStateChanged(auth, async (user) => {
        const nav = document.querySelector('nav');
        const existingAuthLinks = nav.querySelectorAll('.auth-link');
        existingAuthLinks.forEach(link => link.remove());

        if (user) {
          currentUser = user;
          
          const username = user.email.split('@')[0];
          
          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);

          await loadForm();
        } else {
          const loginLink = document.createElement('a');
          loginLink.href = '/login.html';
          loginLink.className = 'auth-link';
          loginLink.textContent = 'Login';
          nav.appendChild(loginLink);

          document.getElementById('submit-content').innerHTML = `
            <div class="login-required">
              <h3>Login Required</h3>
              <p>You need to <a href="/login.html">log in</a> to submit levels.</p>
            </div>
          `;
        }
      });

      async function loadForm() {
        const content = document.getElementById('submit-content');

        // Load levels
        const text = await fetch(SHEET_URL).then(r => r.text());
        allLevels = parseCSV(text).sort((a, b) => Number(a.rank) - Number(b.rank));

        // Get user's existing completions
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        const userData = userDoc.data();
        const completions = userData?.completions || [];

        content.innerHTML = `
          <div class="submit-form">
            <div class="form-group">
              <label>Level</label>
              <select id="level">
                <option value="">Select a level...</option>
                ${allLevels.map(l => {
                  const alreadyCompleted = completions.includes(l.slug);
                  return `<option value="${l.slug}" ${alreadyCompleted ? 'disabled' : ''}>
                    #${l.rank} – ${l.name} ${alreadyCompleted ? '(already completed)' : ''}
                  </option>`;
                }).join('')}
              </select>
            </div>

            <div class="form-group">
              <label>Video Link <span style="color:var(--text-muted);font-size:11px">(optional)</span></label>
              <input type="url" id="video" placeholder="https://youtube.com/watch?v=..." />
              <span class="form-note">Must be a YouTube link if provided. Required for Insane/Extreme demons.</span>
            </div>

            <button class="submit-btn" id="submit-btn" onclick="window.submitCompletion()">Submit Run</button>
            <p class="status-msg" id="status"></p>
          </div>
        `;
      }

      function isYouTube(url) {
        return !url || url.includes('youtube.com') || url.includes('youtu.be');
      }

      window.submitCompletion = async function() {
        const levelSlug = document.getElementById('level').value;
        const video = document.getElementById('video').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('submit-btn');

        if (!levelSlug) {
          showStatus('Please select a level.', 'error');
          return;
        }

        if (video && !isYouTube(video)) {
          showStatus('Video must be a YouTube link.', 'error');
          return;
        }

        const level = allLevels.find(l => l.slug === levelSlug);
        const difficulty = level?.inGameRating || '';
        const isHardcore = difficulty === 'Insane Demon' || difficulty === 'Extreme Demon';

        if (isHardcore && !video) {
          showStatus('Video required for Insane/Extreme demons.', 'error');
          return;
        }

        btn.disabled = true;
        showStatus('Submitting...', '');

        try {
          if (isHardcore) {
            // Send to Google Sheets for manual review
            await fetch(SCRIPT_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                player: currentUser.email.split('@')[0],
                level: levelSlug,
                video: video
              })
            });
            showStatus('✅ Submitted for review! We\'ll approve it shortly.', 'success');
          } else {
            // Auto-approve: add to user's completions
            await updateDoc(doc(db, 'users', currentUser.uid), {
              completions: arrayUnion(levelSlug)
            });
            showStatus('✅ Level added to your profile!', 'success');
            
            // Reload form to update disabled levels
            setTimeout(() => loadForm(), 1500);
          }

          document.getElementById('level').value = '';
          document.getElementById('video').value = '';
        } catch (err) {
          console.error(err);
          showStatus('❌ Something went wrong. Try again.', 'error');
        }

        btn.disabled = false;
      };

      function showStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status-msg ' + type;
      }
    </script>
    <script type="module" src="/nav.js"></script>
  </body>
</html>
