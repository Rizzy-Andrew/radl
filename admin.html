<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Admin Panel</title>
    <style>
      .admin-container {
        max-width: 1200px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .admin-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .admin-header h1 {
        font-family: 'Bebas Neue', cursive;
        font-size: 48px;
        color: var(--accent2);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        text-align: center;
      }

      .stat-number {
        font-family: 'Bebas Neue', cursive;
        font-size: 36px;
        color: var(--accent);
      }

      .stat-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-muted);
        margin-top: 8px;
      }

      .tabs {
        display: flex;
        gap: 12px;
        margin-bottom: 32px;
        border-bottom: 2px solid var(--border);
      }

      .tab {
        padding: 12px 24px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-family: 'Bebas Neue', cursive;
        font-size: 18px;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.2s;
      }

      .tab:hover {
        color: var(--text);
      }

      .tab.active {
        color: var(--accent2);
        border-bottom-color: var(--accent2);
      }

      .submissions-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .submission-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      .submission-info {
        flex: 1;
      }

      .submission-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .level-name {
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
        color: var(--accent);
      }

      .status-badge {
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .status-pending {
        background: rgba(251, 191, 36, 0.2);
        color: #fbbf24;
      }

      .status-approved {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
      }

      .status-rejected {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }

      .submission-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .detail-item {
        font-size: 13px;
      }

      .detail-label {
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 11px;
        margin-bottom: 4px;
      }

      .detail-value {
        color: var(--text);
        font-weight: 600;
      }

      .video-link {
        color: var(--accent3);
        text-decoration: none;
        font-size: 14px;
      }

      .video-link:hover {
        text-decoration: underline;
      }

      .submission-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .action-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .approve-btn {
        background: #22c55e;
        color: white;
      }

      .approve-btn:hover {
        background: #16a34a;
      }

      .reject-btn {
        background: #ef4444;
        color: white;
      }

      .reject-btn:hover {
        background: #dc2626;
      }

      .action-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .notes-input {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 13px;
        margin-bottom: 8px;
        resize: vertical;
        min-height: 60px;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        font-family: 'Bebas Neue', cursive;
        font-size: 24px;
      }

      .access-denied {
        text-align: center;
        padding: 100px 20px;
      }

      .access-denied h2 {
        font-family: 'Bebas Neue', cursive;
        font-size: 36px;
        color: #ef4444;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/#classic">Classic Levels</a>
      <a href="/#platformer">Platformer Levels</a>
      <a href="/placement-history.html">Placement History</a>
      <a href="/submit.html">Submit</a>
      <a href="/leaderboard.html">Leaderboard</a>
    </nav>

    <div class="admin-container" id="adminPanel" style="display: none;">
      <div class="admin-header">
        <h1>Admin Panel</h1>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="pendingCount">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="approvedCount">0</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="rejectedCount">0</div>
          <div class="stat-label">Rejected</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('pending')">Pending</button>
        <button class="tab" onclick="showTab('approved')">Approved</button>
        <button class="tab" onclick="showTab('rejected')">Rejected</button>
      </div>

      <div id="submissionsList" class="submissions-list"></div>
    </div>

    <div id="loadingMessage" class="loading">Loading admin panel...</div>

    <div id="accessDenied" class="access-denied" style="display: none;">
      <h2>Access Denied</h2>
      <p>You don't have permission to view this page.</p>
      <a href="/" style="color: var(--accent2);">Return to home</a>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, orderBy } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let currentTab = 'pending';
      let allSubmissions = [];

      // Check if user is admin
      async function checkAdminAccess(user) {
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (userDoc.exists()) {
            const userData = userDoc.data();
            return userData.isAdmin === true;
          }
          return false;
        } catch (error) {
          console.error('Error checking admin access:', error);
          return false;
        }
      }

      // Load all submissions
      async function loadSubmissions() {
        try {
          const submissionsRef = collection(db, 'submissions');
          const q = query(submissionsRef, orderBy('submittedAt', 'desc'));
          const querySnapshot = await getDocs(q);
          
          allSubmissions = [];
          querySnapshot.forEach(doc => {
            allSubmissions.push({
              id: doc.id,
              ...doc.data()
            });
          });

          updateStats();
          showTab(currentTab);
        } catch (error) {
          console.error('Error loading submissions:', error);
        }
      }

      // Update stats counters
      function updateStats() {
        const pending = allSubmissions.filter(s => s.status === 'pending').length;
        const approved = allSubmissions.filter(s => s.status === 'approved').length;
        const rejected = allSubmissions.filter(s => s.status === 'rejected').length;

        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('approvedCount').textContent = approved;
        document.getElementById('rejectedCount').textContent = rejected;
      }

      // Show tab
      window.showTab = function(tab) {
        currentTab = tab;

        // Update tab buttons
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => {
          if (t.textContent.toLowerCase() === tab) {
            t.classList.add('active');
          }
        });

        // Filter submissions
        const filtered = allSubmissions.filter(s => s.status === tab);
        renderSubmissions(filtered);
      }

      // Render submissions
      function renderSubmissions(submissions) {
        const container = document.getElementById('submissionsList');

        if (submissions.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <p>No ${currentTab} submissions</p>
            </div>
          `;
          return;
        }

        container.innerHTML = submissions.map(sub => `
          <div class="submission-card">
            <div class="submission-info">
              <div class="submission-header">
                <div class="level-name">${sub.levelName}</div>
                <span class="status-badge status-${sub.status}">${sub.status}</span>
              </div>

              <div class="submission-details">
                <div class="detail-item">
                  <div class="detail-label">Submitted By</div>
                  <div class="detail-value">${sub.username}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Submitted At</div>
                  <div class="detail-value">${new Date(sub.submittedAt.toDate()).toLocaleDateString()}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Video Proof</div>
                  <a href="${sub.videoURL}" target="_blank" class="video-link">Watch Video →</a>
                </div>
              </div>

              ${sub.notes ? `
                <div style="margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 6px; font-size: 13px;">
                  <strong style="color: var(--text-muted);">Admin Notes:</strong> ${sub.notes}
                </div>
              ` : ''}

              ${sub.status === 'pending' ? `
                <textarea 
                  class="notes-input" 
                  id="notes-${sub.id}" 
                  placeholder="Add admin notes (optional)..."
                ></textarea>
              ` : ''}
            </div>

            ${sub.status === 'pending' ? `
              <div class="submission-actions">
                <button class="action-btn approve-btn" onclick="approveSubmission('${sub.id}', '${sub.userId}', '${sub.levelSlug}')">
                  Approve
                </button>
                <button class="action-btn reject-btn" onclick="rejectSubmission('${sub.id}')">
                  Reject
                </button>
              </div>
            ` : ''}
          </div>
        `).join('');
      }

      // Approve submission
      window.approveSubmission = async function(submissionId, userId, levelSlug) {
        const notes = document.getElementById(`notes-${submissionId}`)?.value || '';
        
        if (!confirm('Approve this submission? This will add the level to the user\'s completions.')) {
          return;
        }

        try {
          // Update submission status
          await updateDoc(doc(db, 'submissions', submissionId), {
            status: 'approved',
            reviewedAt: new Date(),
            reviewedBy: auth.currentUser.uid,
            notes: notes
          });

          // Add level to user's completions
          const userRef = doc(db, 'users', userId);
          const userDoc = await getDoc(userRef);
          
          if (userDoc.exists()) {
            const userData = userDoc.data();
            const completions = userData.completions || [];
            
            if (!completions.includes(levelSlug)) {
              completions.push(levelSlug);
              await updateDoc(userRef, { completions });
            }
          }

          alert('Submission approved!');
          await loadSubmissions();
        } catch (error) {
          console.error('Error approving submission:', error);
          alert('Failed to approve submission. Please try again.');
        }
      }

      // Reject submission
      window.rejectSubmission = async function(submissionId) {
        const notes = document.getElementById(`notes-${submissionId}`)?.value || '';
        
        if (!confirm('Reject this submission?')) {
          return;
        }

        try {
          await updateDoc(doc(db, 'submissions', submissionId), {
            status: 'rejected',
            reviewedAt: new Date(),
            reviewedBy: auth.currentUser.uid,
            notes: notes
          });

          alert('Submission rejected.');
          await loadSubmissions();
        } catch (error) {
          console.error('Error rejecting submission:', error);
          alert('Failed to reject submission. Please try again.');
        }
      }

      // Auth state check
      onAuthStateChanged(auth, async (user) => {
        const nav = document.querySelector('nav');
        const existingAuthLinks = nav.querySelectorAll('.auth-link');
        existingAuthLinks.forEach(link => link.remove());

        if (user) {
          // Check if user is admin
          const isAdmin = await checkAdminAccess(user);

          if (isAdmin) {
            // Show admin panel
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            await loadSubmissions();
          } else {
            // Access denied
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('accessDenied').style.display = 'block';
          }

          // Update nav
          const username = user.email.split('@')[0];
          
          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          if (isAdmin) {
            const adminLink = document.createElement('a');
            adminLink.href = '/admin.html';
            adminLink.className = 'auth-link';
            adminLink.textContent = 'Admin';
            nav.appendChild(adminLink);
          }

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);
        } else {
          // Not logged in
          window.location.href = '/login.html';
        }
      });
    </script>
  </body>
</html>
