<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Login</title>
    <style>
      .auth-container {
        max-width: 420px;
        margin: 80px auto;
        padding: 0 20px;
      }

      .auth-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .auth-card h1 {
        font-size: 32px;
        margin-bottom: 8px;
        text-align: center;
      }

      .auth-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--accent2);
        font-weight: 800;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 16px;
        color: var(--text);
        font-family: 'Shantell Sans', cursive;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      .form-group input:focus {
        border-color: var(--accent2);
      }

      .auth-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 8px;
        color: white;
        font-family: 'Shantell Sans', cursive;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 8px;
      }

      .auth-btn:hover {
        opacity: 0.9;
      }

      .auth-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .google-btn {
        background: white;
        color: #333;
        border: 1px solid var(--border);
        margin-top: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .google-btn:hover {
        opacity: 1;
        background: #f5f5f5;
      }

      .discord-btn {
        background: #5865F2;
        color: white;
        border: none;
        margin-top: 12px;
        display: none;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .discord-btn:hover {
        opacity: 1;
        background: #4752C4;
      }

      .divider {
        text-align: center;
        margin: 24px 0;
        color: var(--text-muted);
        font-size: 13px;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: var(--border);
      }

      .divider::before { left: 0; }
      .divider::after { right: 0; }

      .error-msg {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid #f87171;
        border-radius: 6px;
        padding: 12px;
        color: #f87171;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
      }

      .error-msg.show {
        display: block;
      }

      .auth-footer {
        text-align: center;
        margin-top: 24px;
        color: var(--text-muted);
        font-size: 14px;
      }

      .auth-footer a {
        color: var(--accent2);
        text-decoration: none;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/#classic">Classic Levels</a>
      <a href="/#platformer">Platformer Levels</a>
      <a href="/placement-history.html">Placement History</a>
      <a href="/submit.html">Submit</a>
      <a href="/leaderboard.html">Leaderboard</a>
    </nav>

    <div class="auth-container">
      <div class="auth-card">
        <h1>Login</h1>
        <p class="auth-subtitle">Welcome back to RADL</p>

        <div class="error-msg" id="error-msg"></div>

        <form id="login-form">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required />
          </div>

          <button type="submit" class="auth-btn" id="login-btn">Log In</button>
        </form>

        <div class="divider">OR</div>

        <button class="auth-btn google-btn" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            <path fill="none" d="M0 0h48v48H0z"></path>
          </svg>
          Continue with Google
        </button>

        <button class="auth-btn discord-btn" id="discord-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.956-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.419 2.157-2.419c1.21 0 2.176 1.096 2.157 2.42c0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          Continue with Discord
        </button>

        <div class="auth-footer">
          Don't have an account? <a href="/signup.html">Sign up</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, OAuthProvider } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const googleProvider = new GoogleAuthProvider();

      function showError(msg) {
        const errorEl = document.getElementById('error-msg');
        errorEl.textContent = msg;
        errorEl.classList.add('show');
      }

      function hideError() {
        document.getElementById('error-msg').classList.remove('show');
      }

      // Create user profile if it doesn't exist (for OAuth users)
      async function ensureUserProfile(user) {
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (!userDoc.exists()) {
            // Create profile for OAuth user
            const username = user.email ? user.email.split('@')[0] : `user_${user.uid.substring(0, 8)}`;
            await setDoc(doc(db, 'users', user.uid), {
              uid: user.uid,
              email: user.email,
              username: username,
              completions: [],
              createdAt: new Date()
            });
          }
        } catch (error) {
          console.error('Error ensuring user profile:', error);
        }
      }

      // Email/Password Login
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');

        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = '/';
        } catch (error) {
          let msg = 'Login failed. Please try again.';
          if (error.code === 'auth/user-not-found') msg = 'No account found with this email.';
          if (error.code === 'auth/wrong-password') msg = 'Incorrect password.';
          if (error.code === 'auth/invalid-email') msg = 'Invalid email address.';
          showError(msg);
          btn.disabled = false;
          btn.textContent = 'Log In';
        }
      });

      // Google Sign-In
      document.getElementById('google-btn').addEventListener('click', async () => {
        hideError();
        try {
          const result = await signInWithPopup(auth, googleProvider);
          await ensureUserProfile(result.user);
          window.location.href = '/';
        } catch (error) {
          showError('Google sign-in failed. Please try again.');
        }
      });

      // Discord Sign-In (if enabled in Firebase)
      const discordBtn = document.getElementById('discord-btn');
      
      try {
        const discordProvider = new OAuthProvider('oidc.discord');
        // If no error, Discord is configured - show the button
        discordBtn.style.display = 'flex';
        
        discordBtn.addEventListener('click', async () => {
          hideError();
          try {
            const result = await signInWithPopup(auth, discordProvider);
            await ensureUserProfile(result.user);
            window.location.href = '/';
          } catch (error) {
            console.error('Discord sign-in error:', error);
            showError('Discord sign-in failed. Please try again.');
          }
        });
      } catch (error) {
        // Discord provider not configured, keep button hidden
        console.log('Discord OAuth not configured');
      }
    </script>
  </body>
</html>
