<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Settings</title>
    <style>
      .settings-container {
        max-width: 700px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .settings-card {
        background: var(--surface);
        padding: 32px;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin-bottom: 24px;
      }

      .settings-card h2 {
        font-family: 'Bebas Neue', cursive;
        font-size: 28px;
        margin-bottom: 24px;
        color: var(--accent2);
      }

      .avatar-section {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 32px;
      }

      .avatar-preview {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: var(--bg);
        border: 3px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .avatar-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .avatar-placeholder {
        font-size: 48px;
        color: var(--text-muted);
      }

      .avatar-controls {
        flex: 1;
      }

      .file-input-wrapper {
        position: relative;
        display: inline-block;
      }

      .file-input-label {
        display: inline-block;
        padding: 10px 20px;
        background: var(--accent2);
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s;
      }

      .file-input-label:hover {
        background: var(--accent);
      }

      .file-input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }

      .remove-avatar-btn {
        display: inline-block;
        margin-left: 12px;
        padding: 10px 20px;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.2s;
      }

      .remove-avatar-btn:hover {
        background: #dc2626;
      }

      .upload-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 8px;
      }

      .form-group {
        margin-bottom: 24px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 16px;
        font-family: inherit;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent2);
      }

      .form-group input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .help-text {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      .btn {
        background: var(--accent2);
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn:hover {
        background: var(--accent);
        transform: translateY(-2px);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
      }

      .message.success {
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }

      .message.error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--bg);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 12px;
        display: none;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent2);
        transition: width 0.3s;
        width: 0%;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/#classic">Classic Levels</a>
      <a href="/#platformer">Platformer Levels</a>
      <a href="/placement-history.html">Placement History</a>
      <a href="/submit.html">Submit</a>
      <a href="/leaderboard.html">Leaderboard</a>
    </nav>

    <div class="settings-container">
      <h1 style="font-family: 'Bebas Neue', cursive; font-size: 40px; margin-bottom: 32px;">Settings</h1>

      <!-- Profile Picture Section -->
      <div class="settings-card">
        <h2>Profile Picture</h2>
        <div id="avatarMessage"></div>

        <div class="avatar-section">
          <div class="avatar-preview" id="avatarPreview">
            <span class="avatar-placeholder">👤</span>
          </div>

          <div class="avatar-controls">
            <div class="file-input-wrapper">
              <label for="avatarUpload" class="file-input-label">Upload Photo</label>
              <input type="file" id="avatarUpload" class="file-input" accept="image/*">
            </div>
            <button class="remove-avatar-btn" id="removeAvatarBtn" style="display: none;">Remove</button>
            <div class="upload-hint">JPG, PNG, or GIF. Max 5MB.</div>
            <div class="progress-bar" id="uploadProgress">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bio Section -->
      <div class="settings-card">
        <h2>Bio</h2>
        <div id="bioMessage"></div>

        <form id="bioForm">
          <div class="form-group">
            <label for="bio">About You</label>
            <textarea id="bio" placeholder="Tell us about yourself..." maxlength="500"></textarea>
            <div class="help-text">Max 500 characters</div>
          </div>
          <button type="submit" class="btn" id="bioBtn">Update Bio</button>
        </form>
      </div>

      <!-- Username Section -->
      <div class="settings-card">
        <h2>Username</h2>
        <div id="usernameMessage"></div>

        <div style="background: var(--bg); padding: 12px 16px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 24px;">
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">Current Username</div>
          <strong id="currentUsername" style="color: var(--accent); font-family: 'Bebas Neue', cursive; font-size: 18px;">Loading...</strong>
        </div>

        <form id="usernameForm">
          <div class="form-group">
            <label for="newUsername">New Username</label>
            <input 
              type="text" 
              id="newUsername" 
              placeholder="Enter new username"
              minlength="3"
              maxlength="20"
              pattern="[a-zA-Z0-9_-]+"
              required
            >
            <div class="help-text">3-20 characters. Letters, numbers, hyphens, and underscores only.</div>
          </div>
          <button type="submit" class="btn" id="usernameBtn">Update Username</button>
        </form>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, doc, getDoc, updateDoc, query, collection, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
      import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const storage = getStorage(app);

      let currentUser = null;
      let userData = null;

      // Show message helper
      function showMessage(elementId, text, type) {
        const messageDiv = document.getElementById(elementId);
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = text;
        messageDiv.style.display = 'block';
        
        setTimeout(() => {
          messageDiv.style.display = 'none';
        }, 5000);
      }

      // Load avatar
      function loadAvatar(avatarURL) {
        const preview = document.getElementById('avatarPreview');
        const removeBtn = document.getElementById('removeAvatarBtn');

        if (avatarURL) {
          preview.innerHTML = `<img src="${avatarURL}" alt="Avatar">`;
          removeBtn.style.display = 'inline-block';
        } else {
          preview.innerHTML = '<span class="avatar-placeholder">👤</span>';
          removeBtn.style.display = 'none';
        }
      }

      // Upload avatar
      document.getElementById('avatarUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !currentUser) return;

        // Validate file
        if (file.size > 5 * 1024 * 1024) {
          showMessage('avatarMessage', 'File size must be less than 5MB', 'error');
          return;
        }

        if (!file.type.startsWith('image/')) {
          showMessage('avatarMessage', 'Please upload an image file', 'error');
          return;
        }

        // Show progress bar
        const progressBar = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        progressBar.style.display = 'block';

        try {
          // Upload to Firebase Storage
          const storageRef = ref(storage, `avatars/${currentUser.uid}/${Date.now()}_${file.name}`);
          const uploadTask = uploadBytesResumable(storageRef, file);

          uploadTask.on('state_changed', 
            (snapshot) => {
              const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              progressFill.style.width = progress + '%';
            },
            (error) => {
              console.error('Upload error:', error);
              showMessage('avatarMessage', 'Failed to upload image', 'error');
              progressBar.style.display = 'none';
            },
            async () => {
              // Upload complete - get download URL
              const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);

              // Update Firestore
              await updateDoc(doc(db, 'users', currentUser.uid), {
                avatarURL: downloadURL
              });

              // Update UI
              loadAvatar(downloadURL);
              userData.avatarURL = downloadURL;
              showMessage('avatarMessage', 'Profile picture updated!', 'success');
              progressBar.style.display = 'none';
              progressFill.style.width = '0%';
            }
          );
        } catch (error) {
          console.error('Error uploading avatar:', error);
          showMessage('avatarMessage', 'Failed to upload image', 'error');
          progressBar.style.display = 'none';
        }
      });

      // Remove avatar
      document.getElementById('removeAvatarBtn').addEventListener('click', async () => {
        if (!currentUser || !confirm('Remove your profile picture?')) return;

        try {
          // Update Firestore
          await updateDoc(doc(db, 'users', currentUser.uid), {
            avatarURL: null
          });

          // Update UI
          loadAvatar(null);
          userData.avatarURL = null;
          showMessage('avatarMessage', 'Profile picture removed', 'success');
        } catch (error) {
          console.error('Error removing avatar:', error);
          showMessage('avatarMessage', 'Failed to remove picture', 'error');
        }
      });

      // Update bio
      document.getElementById('bioForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return;

        const bio = document.getElementById('bio').value.trim();
        const bioBtn = document.getElementById('bioBtn');

        bioBtn.disabled = true;
        bioBtn.textContent = 'Updating...';

        try {
          await updateDoc(doc(db, 'users', currentUser.uid), { bio });
          userData.bio = bio;
          showMessage('bioMessage', 'Bio updated!', 'success');
        } catch (error) {
          console.error('Error updating bio:', error);
          showMessage('bioMessage', 'Failed to update bio', 'error');
        } finally {
          bioBtn.disabled = false;
          bioBtn.textContent = 'Update Bio';
        }
      });

      // Check if username is taken
      async function isUsernameTaken(username) {
        const usersRef = collection(db, 'users');
        const q = query(usersRef, where('username', '==', username));
        const querySnapshot = await getDocs(q);
        return !querySnapshot.empty;
      }

      // Update username
      document.getElementById('usernameForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return;

        const newUsername = document.getElementById('newUsername').value.trim();
        const usernameBtn = document.getElementById('usernameBtn');

        const usernameRegex = /^[a-zA-Z0-9_-]{3,20}$/;
        if (!usernameRegex.test(newUsername)) {
          showMessage('usernameMessage', 'Invalid username format', 'error');
          return;
        }

        usernameBtn.disabled = true;
        usernameBtn.textContent = 'Checking...';

        try {
          const taken = await isUsernameTaken(newUsername);
          
          if (taken) {
            showMessage('usernameMessage', 'Username already taken', 'error');
            usernameBtn.disabled = false;
            usernameBtn.textContent = 'Update Username';
            return;
          }

          usernameBtn.textContent = 'Updating...';
          await updateDoc(doc(db, 'users', currentUser.uid), { username: newUsername });

          document.getElementById('currentUsername').textContent = newUsername;
          document.getElementById('newUsername').value = '';
          userData.username = newUsername;
          
          showMessage('usernameMessage', 'Username updated!', 'success');

        } catch (error) {
          console.error('Error updating username:', error);
          showMessage('usernameMessage', 'Failed to update username', 'error');
        } finally {
          usernameBtn.disabled = false;
          usernameBtn.textContent = 'Update Username';
        }
      });

      // Auth state
      onAuthStateChanged(auth, async (user) => {
        const nav = document.querySelector('nav');
        const existingAuthLinks = nav.querySelectorAll('.auth-link');
        existingAuthLinks.forEach(link => link.remove());

        if (user) {
          currentUser = user;

          // Load user data
          try {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
              userData = userDoc.data();
              
              // Load avatar
              loadAvatar(userData.avatarURL);
              
              // Load username
              document.getElementById('currentUsername').textContent = userData.username || user.email.split('@')[0];
              
              // Load bio
              document.getElementById('bio').value = userData.bio || '';
            }
          } catch (error) {
            console.error('Error loading profile:', error);
          }

          // Update nav
          const username = userData?.username || user.email.split('@')[0];
          
          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          const settingsLink = document.createElement('a');
          settingsLink.href = '/settings.html';
          settingsLink.className = 'auth-link';
          settingsLink.textContent = 'Settings';
          nav.appendChild(settingsLink);

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);
        } else {
          window.location.href = '/login.html';
        }
      });
    </script>
  </body>
</html>
