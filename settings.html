<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>RADL – Settings</title>
    <style>
      .settings-container {
        max-width: 600px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .settings-card {
        background: var(--surface);
        padding: 32px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .settings-card h2 {
        font-family: 'Bebas Neue', cursive;
        font-size: 32px;
        margin-bottom: 24px;
        color: var(--accent2);
      }

      .form-group {
        margin-bottom: 24px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 16px;
        font-family: inherit;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--accent2);
      }

      .form-group input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .help-text {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      .btn {
        background: var(--accent2);
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn:hover {
        background: var(--accent);
        transform: translateY(-2px);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
      }

      .message.success {
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }

      .message.error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .current-username {
        background: var(--bg);
        padding: 12px 16px;
        border-radius: 6px;
        border: 1px solid var(--border);
        margin-bottom: 24px;
      }

      .current-username strong {
        color: var(--accent);
        font-family: 'Bebas Neue', cursive;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/#classic">Classic Levels</a>
      <a href="/#platformer">Platformer Levels</a>
      <a href="/placement-history.html">Placement History</a>
      <a href="/submit.html">Submit</a>
      <a href="/leaderboard.html">Leaderboard</a>
    </nav>

    <div class="settings-container">
      <div class="settings-card">
        <h2>Account Settings</h2>

        <div id="message"></div>

        <div class="current-username">
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">Current Username</div>
          <strong id="currentUsername">Loading...</strong>
        </div>

        <form id="usernameForm">
          <div class="form-group">
            <label for="newUsername">New Username</label>
            <input 
              type="text" 
              id="newUsername" 
              placeholder="Enter new username"
              minlength="3"
              maxlength="20"
              pattern="[a-zA-Z0-9_-]+"
              required
            >
            <div class="help-text">3-20 characters. Letters, numbers, hyphens, and underscores only.</div>
          </div>

          <button type="submit" class="btn" id="submitBtn">Update Username</button>
        </form>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
      import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
      import { getFirestore, doc, getDoc, updateDoc, query, collection, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

      const firebaseConfig = {
        apiKey: "AIzaSyAyNCyGdahYYsLbG1sP8GGKc7AAogyI7V4",
        authDomain: "radl-652e8.firebaseapp.com",
        projectId: "radl-652e8",
        storageBucket: "radl-652e8.firebasestorage.app",
        messagingSenderId: "453756233220",
        appId: "1:453756233220:web:a43c80ffe66ab17c4f7751"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      let currentUser = null;

      // Show message helper
      function showMessage(text, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.className = `message ${type}`;
        messageDiv.textContent = text;
        messageDiv.style.display = 'block';
        
        setTimeout(() => {
          messageDiv.style.display = 'none';
        }, 5000);
      }

      // Check if username is already taken
      async function isUsernameTaken(username) {
        const usersRef = collection(db, 'users');
        const q = query(usersRef, where('username', '==', username));
        const querySnapshot = await getDocs(q);
        return !querySnapshot.empty;
      }

      // Load current user data
      onAuthStateChanged(auth, async (user) => {
        const nav = document.querySelector('nav');
        const existingAuthLinks = nav.querySelectorAll('.auth-link');
        existingAuthLinks.forEach(link => link.remove());

        if (user) {
          currentUser = user;

          // Load user profile to show current username
          try {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
              const userData = userDoc.data();
              const displayUsername = userData.username || user.email.split('@')[0];
              document.getElementById('currentUsername').textContent = displayUsername;
            }
          } catch (error) {
            console.error('Error loading profile:', error);
          }

          // Update nav
          const username = user.email.split('@')[0];
          
          const profileLink = document.createElement('a');
          profileLink.href = '/profile.html';
          profileLink.className = 'auth-link';
          profileLink.textContent = username;
          nav.appendChild(profileLink);

          const settingsLink = document.createElement('a');
          settingsLink.href = '/settings.html';
          settingsLink.className = 'auth-link';
          settingsLink.textContent = 'Settings';
          nav.appendChild(settingsLink);

          const logoutLink = document.createElement('a');
          logoutLink.href = '#';
          logoutLink.className = 'auth-link';
          logoutLink.textContent = 'Logout';
          logoutLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = '/';
          });
          nav.appendChild(logoutLink);
        } else {
          // Redirect to login if not authenticated
          window.location.href = '/login.html';
        }
      });

      // Handle username update form submission
      document.getElementById('usernameForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!currentUser) {
          showMessage('You must be logged in to update your username.', 'error');
          return;
        }

        const newUsername = document.getElementById('newUsername').value.trim();
        const submitBtn = document.getElementById('submitBtn');

        // Validate username format
        const usernameRegex = /^[a-zA-Z0-9_-]{3,20}$/;
        if (!usernameRegex.test(newUsername)) {
          showMessage('Invalid username format. Use 3-20 characters (letters, numbers, hyphens, underscores only).', 'error');
          return;
        }

        // Disable button during processing
        submitBtn.disabled = true;
        submitBtn.textContent = 'Checking...';

        try {
          // Check if username is already taken
          const taken = await isUsernameTaken(newUsername);
          
          if (taken) {
            showMessage('Username is already taken. Please choose another.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Update Username';
            return;
          }

          // Update username in Firestore
          submitBtn.textContent = 'Updating...';
          const userRef = doc(db, 'users', currentUser.uid);
          await updateDoc(userRef, {
            username: newUsername
          });

          // Update display
          document.getElementById('currentUsername').textContent = newUsername;
          document.getElementById('newUsername').value = '';
          
          showMessage('Username updated successfully!', 'success');
          
          // Update nav to reflect new username
          const profileLink = document.querySelector('nav .auth-link[href="/profile.html"]');
          if (profileLink) {
            profileLink.textContent = newUsername;
          }

        } catch (error) {
          console.error('Error updating username:', error);
          showMessage('Failed to update username. Please try again.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Username';
        }
      });
    </script>
  </body>
</html>
